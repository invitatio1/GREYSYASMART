<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Multi-LP</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>♾️</text></svg>">
    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --input-focus-ring: rgba(102, 126, 234, 0.1);
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --switch-bg-off: #cbd5e0;
            --switch-bg-on: #48bb78;
            --btn-reset-bg: #cbd5e0;
            --btn-reset-text: #4a5568;
            --btn-reset-hover: #a0aec0;
            --lp-selected-bg: #f0fff4;
            --lp-selected-border: #48bb78;
            --shadow-card: 0 10px 25px rgba(0,0,0,0.05);
            --shadow-input: 0 0 0 3px var(--input-focus-ring);
            --fb-selected-bg: #e7f3ff;
            --fb-selected-border: #1877f2;
            --fb-blue: #1877f2;
            --fb-blue-bg: #e8f0fe;
            --fb-blue-border: #a8c7fa;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e0;
            --text-muted: #64748b;
            --border: #334155;
            --input-bg: #0f172a;
            --input-border: #334155;
            --input-focus-ring: rgba(102, 126, 234, 0.2);
            --switch-bg-off: #475569;
            --btn-reset-bg: #334155;
            --btn-reset-text: #94a3b8;
            --btn-reset-hover: #475569;
            --lp-selected-bg: rgba(72, 187, 120, 0.1);
            --lp-selected-border: #48bb78;
            --shadow-card: 0 10px 25px rgba(0,0,0,0.4);
            --fb-selected-bg: rgba(24, 119, 242, 0.12);
            --fb-selected-border: #4d9aff;
            --fb-blue: #4d9aff;
            --fb-blue-bg: rgba(24, 119, 242, 0.1);
            --fb-blue-border: rgba(77, 154, 255, 0.3);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: var(--bg-body); 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            min-height: 100vh;
            transition: background 0.3s ease;
        } 
        
        .card { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: var(--shadow-card); 
            width: 100%; 
            max-width: 600px; 
            transition: background 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        } 
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h2 { 
            margin: 0;
            color: var(--text-main); 
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-weight: 800; 
            font-size: 1.75rem;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .theme-toggle-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover {
            background: var(--input-bg);
            color: var(--text-main);
        }
        .theme-toggle-btn svg { width: 20px; height: 20px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-secondary); font-size: 14px; }
        
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid var(--input-border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: var(--input-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
        } 
        input:focus { 
            border-color: var(--accent-primary); 
            outline: none; 
            box-shadow: var(--shadow-input);
        }

        /* --- PANEL SECTION (LP & FB sama gaya) --- */
        .panel-section {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
        }

        .panel-control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 4px 10px;
            background: var(--input-bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .panel-status-text {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
        }
        .panel-status-dot.on { background: var(--switch-bg-on); }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--switch-bg-off);
            transition: .4s;
            border-radius: 16px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--switch-bg-on); }
        input:checked + .slider:before { transform: translateX(16px); }

        .panel-container-disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* --- LP GRID --- */
        .lp-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-bottom: 5px;
        }

        .lp-item {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 40px;
        }
        .lp-item:hover { border-color: var(--text-muted); }
        .lp-item.selected {
            border-color: var(--lp-selected-border);
            background-color: var(--lp-selected-bg);
        }
        .lp-name { 
            font-weight: bold; 
            font-size: 0.75rem; 
            color: var(--text-main); 
            flex-grow: 1; 
            text-align: center;
        }
        .lp-checkbox {
            width: 14px; 
            height: 14px;
            accent-color: var(--switch-bg-on);
            cursor: pointer;
        }

        .lp-custom-input {
            display: none; 
            margin-top: 5px;
            padding: 5px;
            background: rgba(251, 211, 141, 0.1);
            border: 1px solid #fbd38d;
            border-radius: 6px;
        }
        [data-theme="dark"] .lp-custom-input {
            background: rgba(251, 211, 141, 0.05);
        }

        /* --- FB CLOAK GRID --- */
        .fb-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-bottom: 5px;
        }

        .fb-item {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
        }
        .fb-item:hover { border-color: var(--text-muted); }
        .fb-item.selected {
            border-color: var(--fb-selected-border);
            background-color: var(--fb-selected-bg);
        }

        .fb-prefix-text {
            font-family: 'Courier New', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.3;
            word-break: break-all;
            transition: color 0.2s;
        }
        .fb-item.selected .fb-prefix-text {
            color: var(--fb-blue);
        }

        .fb-custom-input {
            display: none; 
            margin-top: 5px;
            padding: 5px;
            background: var(--fb-blue-bg);
            border: 1px solid var(--fb-blue-border);
            border-radius: 6px;
        }

        /* --- PIPELINE VISUAL --- */
        .pipeline-visual {
            display: none;
            margin-bottom: 20px;
            padding: 8px 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }
        .pipeline-visual.show { display: block; }

        .pipeline-label {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }

        .pipeline-steps {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .pipeline-step {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 5px;
            border: 1px solid;
            white-space: nowrap;
        }
        .pipeline-step.step-smartlink {
            background: rgba(102, 126, 234, 0.1);
            color: var(--accent-primary);
            border-color: rgba(102, 126, 234, 0.3);
        }
        .pipeline-step.step-lp {
            background: var(--lp-selected-bg);
            color: var(--lp-selected-border);
            border-color: var(--lp-selected-border);
        }
        .pipeline-step.step-fb {
            background: var(--fb-blue-bg);
            color: var(--fb-blue);
            border-color: var(--fb-blue-border);
        }
        .pipeline-arrow {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- BUTTONS --- */
        .btn-group {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        button { 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
        } 
        button:active { transform: scale(0.98); }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }
        .btn-generate:hover { opacity: 0.9; }

        .btn-reset {
            background: var(--btn-reset-bg);
            color: var(--btn-reset-text);
        }
        .btn-reset:hover { background: var(--btn-reset-hover); }

        /* --- OUTPUT --- */
        .output-box { 
            margin-top: 30px; 
            border-top: 2px dashed var(--border); 
            padding-top: 20px; 
            display: none; 
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .output-title { font-weight: bold; color: var(--text-main); font-size: 14px; }

        .btn-copy-all {
            background: var(--switch-bg-on);
            color: white;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(72, 187, 120, 0.3);
        }
        .btn-copy-all:hover { background: #38a169; }

        .output-info-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .info-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid;
        }
        .info-badge.lp-badge {
            background: var(--lp-selected-bg);
            color: var(--lp-selected-border);
            border-color: var(--lp-selected-border);
        }
        .info-badge.fb-badge {
            background: var(--fb-blue-bg);
            color: var(--fb-blue);
            border-color: var(--fb-blue-border);
        }

        .list-container {
            max-height: 300px;
            overflow-y: auto;
            background: var(--input-bg);
            border-radius: 8px;
            padding: 5px;
            border: 1px solid var(--border);
        }
        .list-container::-webkit-scrollbar { width: 6px; }
        .list-container::-webkit-scrollbar-track { background: transparent; }
        .list-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .item { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            padding: 10px 12px; 
            margin-bottom: 8px; 
            border-radius: 6px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-family: 'Courier New', monospace; 
            font-size: 12px; 
            color: var(--text-main);
            transition: all 0.15s;
        }
        .item:hover { transform: translateX(2px); border-color: var(--text-muted); }
        
        .copy-btn { 
            background: var(--input-bg); 
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        } 
        .copy-btn:hover { background: var(--border); color: var(--text-main); }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #toast.show { opacity: 1; bottom: 50px; }

        @media (max-width: 500px) {
            .card { padding: 20px; }
            h2 { font-size: 1.4rem; }
            .fb-prefix-text { font-size: 0.55rem; }
            .fb-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <h2>⚡multi link</h2>
        <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" title="Ganti Tema">
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display: none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>
    </div>

    <!-- Smartlink Input -->
    <div class="form-group">
        <label>Smartlink Asli</label>
        <input type="text" id="smartlinkInput" placeholder="https://smartlink.com/?ref=user">
    </div>

    <!-- Landing Page Panel -->
    <div class="form-group">
        <div class="panel-section">
            <div class="panel-control-header">
                <div class="panel-status-text">
                    <span class="panel-status-dot" id="lpDot"></span>
                    <span id="lpStatusText">Off (Direct)</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="lpSwitch" onchange="toggleLP()">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="lpContainer" class="panel-container-disabled">
                <div class="lp-grid">
                    <div class="lp-item" onclick="toggleLPSelection(this)" data-url="https://invitatio1.github.io/lp1/">
                        <div class="lp-name">LP 1</div>
                        <input type="checkbox" class="lp-checkbox">
                    </div>
                    <div class="lp-item" onclick="toggleLPSelection(this)" data-url="https://invitatio1.github.io/lp2/">
                        <div class="lp-name">LP 2</div>
                        <input type="checkbox" class="lp-checkbox">
                    </div>
                    <div class="lp-item" onclick="toggleLPSelection(this)" data-url="https://invitatio1.github.io/lp3/">
                        <div class="lp-name">LP 3</div>
                        <input type="checkbox" class="lp-checkbox">
                    </div>
                </div>
                <div class="lp-custom-input" id="lpCustomBox">
                    <label style="font-size:10px; margin-bottom:3px;">URL LP Custom:</label>
                    <input type="text" id="lpCustomInput" placeholder="https://..." style="padding:5px; border:1px solid #e2e8f0; font-size:11px;">
                </div>
            </div>
        </div>
    </div>

    <!-- Cloaking FB Panel -->
    <div class="form-group">
        <div class="panel-section">
            <div class="panel-control-header">
                <div class="panel-status-text">
                    <span class="panel-status-dot" id="fbDot"></span>
                    <span id="fbStatusText">Off (Direct)</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="fbSwitch" onchange="toggleFB()">
                    <span class="slider"></span>
                </label>
            </div>
            <div id="fbContainer" class="panel-container-disabled">
                <div class="fb-grid">
                    <div class="fb-item selected" onclick="selectFB(this)" data-prefix="https://web.facebook.com/l.php?u=">
                        <span class="fb-prefix-text">web.facebook.com/l.php?u=</span>
                    </div>
                    <div class="fb-item" onclick="selectFB(this)" data-prefix="https://l.facebook.com/l.php?u=">
                        <span class="fb-prefix-text">l.facebook.com/l.php?u=</span>
                    </div>
                    <div class="fb-item" onclick="selectFB(this)" data-prefix="https://m.facebook.com/l.php?u=">
                        <span class="fb-prefix-text">m.facebook.com/l.php?u=</span>
                    </div>
                    <div class="fb-item" onclick="selectFB(this)" data-prefix="custom">
                        <span class="fb-prefix-text">Custom prefix...</span>
                    </div>
                </div>
                <div class="fb-custom-input" id="fbCustomBox">
                    <label style="font-size:10px; margin-bottom:3px; color:var(--text-muted);">Prefix URL custom:</label>
                    <input type="text" id="fbCustomInput" placeholder="https://domain.com/redirect?u=" style="padding:5px; border:1px solid var(--border); font-size:11px; background:var(--input-bg); color:var(--text-main);">
                </div>
            </div>
        </div>
    </div>

    <!-- Pipeline Visual -->
    <div class="pipeline-visual" id="pipelineVisual">
        <div class="pipeline-label">Alur Generate</div>
        <div class="pipeline-steps" id="pipelineSteps"></div>
    </div>

    <!-- Jumlah Link -->
    <div class="form-group">
        <label>Jumlah Link</label>
        <input type="number" id="count" value="10" min="1">
    </div>

    <!-- Buttons -->
    <div class="btn-group">
        <button class="btn-generate" onclick="generate()">🚀 Generate Link</button>
        <button class="btn-reset" onclick="resetForm()">🔄 Reset</button>
    </div>

    <!-- Output -->
    <div id="outputBox" class="output-box">
        <div class="output-header">
            <span class="output-title">Hasil Generate (<span id="resultCount">0</span>):</span>
            <button class="btn-copy-all" onclick="copyAll()">📋 Salin Semua</button>
        </div>
        <div class="output-info-badges" id="outputBadges"></div>
        <div class="list-container" id="outputList"></div>
    </div>
</div>

<div id="toast">Berhasil disalin!</div>

<script>
    let selectedFBPrefix = 'https://web.facebook.com/l.php?u=';

    /* ========== THEME ========== */
    function initTheme() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(saved === 'dark' || (!saved && prefersDark) ? 'dark' : 'light');
    }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
    }
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('iconSun').style.display = theme === 'dark' ? 'none' : 'block';
        document.getElementById('iconMoon').style.display = theme === 'dark' ? 'block' : 'none';
    }

    /* ========== LANDING PAGE ========== */
    function toggleLP() {
        const isOn = document.getElementById('lpSwitch').checked;
        const container = document.getElementById('lpContainer');
        const statusText = document.getElementById('lpStatusText');
        const dot = document.getElementById('lpDot');
        if (isOn) {
            container.classList.remove('panel-container-disabled');
            statusText.innerText = "On (aktif)";
            statusText.style.color = "#48bb78";
            dot.classList.add('on');
        } else {
            container.classList.add('panel-container-disabled');
            statusText.innerText = "Off (Direct)";
            statusText.style.color = "#718096";
            dot.classList.remove('on');
        }
        updatePipeline();
    }

    function toggleLPSelection(element) {
        if (!document.getElementById('lpSwitch').checked) return;
        element.classList.toggle('selected');
        const checkbox = element.querySelector('input[type="checkbox"]');
        checkbox.checked = !checkbox.checked;
    }

    function getSelectedLPs() {
        const urls = [];
        const customUrl = document.getElementById('lpCustomInput').value.trim();
        if (customUrl) {
            urls.push(customUrl);
            return urls;
        }
        const checked = document.querySelectorAll('.lp-checkbox:checked');
        checked.forEach(box => {
            urls.push(box.parentElement.getAttribute('data-url'));
        });
        return urls;
    }

    function applyLP(url, lpUrl) {
        const sep = lpUrl.includes('?') ? '&' : '?';
        return lpUrl + sep + 'dest=' + encodeURIComponent(url);
    }

    /* ========== CLOAKING FB ========== */
    function toggleFB() {
        const isOn = document.getElementById('fbSwitch').checked;
        const container = document.getElementById('fbContainer');
        const statusText = document.getElementById('fbStatusText');
        const dot = document.getElementById('fbDot');
        if (isOn) {
            container.classList.remove('panel-container-disabled');
            statusText.innerText = "On (aktif)";
            statusText.style.color = "#48bb78";
            dot.classList.add('on');
        } else {
            container.classList.add('panel-container-disabled');
            statusText.innerText = "Off (Direct)";
            statusText.style.color = "#718096";
            dot.classList.remove('on');
        }
        updatePipeline();
    }

    function selectFB(el) {
        if (!document.getElementById('fbSwitch').checked) return;
        document.querySelectorAll('.fb-item').forEach(item => item.classList.remove('selected'));
        el.classList.add('selected');
        const prefix = el.getAttribute('data-prefix');
        const customBox = document.getElementById('fbCustomBox');
        if (prefix === 'custom') {
            selectedFBPrefix = '';
            customBox.style.display = 'block';
            setTimeout(() => document.getElementById('fbCustomInput').focus(), 100);
        } else {
            selectedFBPrefix = prefix;
            customBox.style.display = 'none';
        }
    }

    function getActiveFBPrefix() {
        if (!document.getElementById('fbSwitch').checked) return '';
        const selected = document.querySelector('.fb-item.selected');
        if (!selected) return '';
        if (selected.getAttribute('data-prefix') === 'custom') {
            return document.getElementById('fbCustomInput').value.trim();
        }
        return selectedFBPrefix;
    }

    function applyFB(url) {
        const prefix = getActiveFBPrefix();
        if (!prefix) return url;
        return prefix + encodeURIComponent(url);
    }

    /* ========== PIPELINE ========== */
    function updatePipeline() {
        const container = document.getElementById('pipelineVisual');
        const steps = document.getElementById('pipelineSteps');
        const lpOn = document.getElementById('lpSwitch').checked;
        const fbOn = document.getElementById('fbSwitch').checked;
        if (!lpOn && !fbOn) {
            container.classList.remove('show');
            return;
        }
        container.classList.add('show');
        let html = '<span class="pipeline-step step-smartlink">Smartlink</span>';
        if (lpOn) {
            html += '<span class="pipeline-arrow">→</span>';
            html += '<span class="pipeline-step step-lp">🏠 Landing Page</span>';
        }
        if (fbOn) {
            html += '<span class="pipeline-arrow">→</span>';
            html += '<span class="pipeline-step step-fb">f Cloaking FB</span>';
        }
        steps.innerHTML = html;
    }

    /* ========== UTILS ========== */
    function makeId(length) {
        let result = '';
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    /* ========== GENERATE ========== */
    function generate() {
        const smartlink = document.getElementById('smartlinkInput').value.trim();
        const count = parseInt(document.getElementById('count').value);
        const lpOn = document.getElementById('lpSwitch').checked;
        const fbOn = document.getElementById('fbSwitch').checked;
        const fbPrefix = getActiveFBPrefix();

        const outputDiv = document.getElementById('outputList');
        const outputBox = document.getElementById('outputBox');
        const badgesDiv = document.getElementById('outputBadges');
        const resultCount = document.getElementById('resultCount');

        outputDiv.innerHTML = '';
        badgesDiv.innerHTML = '';

        if (!smartlink) { showToast('Isi Smartlink dulu!'); return; }
        if (isNaN(count) || count < 1) { showToast('Jumlah link tidak valid!'); return; }
        if (lpOn && getSelectedLPs().length === 0) { showToast('Pilih minimal satu Landing Page!'); return; }
        if (fbOn && !fbPrefix) { showToast('Pilih atau isi prefix cloaking!'); return; }

        const lpList = lpOn ? getSelectedLPs() : [];

        let totalLinks = 0;
        for (let i = 0; i < count; i++) {
            const randomCode = makeId(8);
            const sep = smartlink.includes('?') ? '&' : '?';
            let finalLink = smartlink + sep + randomCode;

            // Step 2: Wrap LP (random pick dari yang terpilih)
            if (lpOn && lpList.length > 0) {
                const randomLP = lpList[Math.floor(Math.random() * lpList.length)];
                finalLink = applyLP(finalLink, randomLP);
            }

            // Step 3: Wrap FB Cloaking
            if (fbOn && fbPrefix) {
                finalLink = applyFB(finalLink);
            }

            addLinkToOutput(finalLink);
            totalLinks++;
        }

        // Info badges
        if (lpOn) {
            const badge = document.createElement('span');
            badge.className = 'info-badge lp-badge';
            badge.textContent = '🏠 ' + lpList.length + ' LP';
            badgesDiv.appendChild(badge);
        }
        if (fbOn) {
            const shortPrefix = fbPrefix.replace('https://', '').split('/')[0];
            const badge = document.createElement('span');
            badge.className = 'info-badge fb-badge';
            badge.textContent = 'f ' + shortPrefix;
            badgesDiv.appendChild(badge);
        }

        outputBox.style.display = 'block';
        resultCount.innerText = totalLinks;
        outputBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function addLinkToOutput(link) {
        const outputDiv = document.getElementById('outputList');
        const safeLink = link.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-right:10px;" title="${safeLink}">${link}</span>
            <button class="copy-btn" onclick="copySingle(this, this.parentElement.querySelector('span').innerText)">Salin</button>
        `;
        outputDiv.appendChild(div);
    }

    /* ========== COPY ========== */
    function copySingle(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = '✓';
            btn.style.color = '#48bb78';
            btn.style.borderColor = '#48bb78';
            setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1000);
        });
    }

    function copyAll() {
        const items = document.querySelectorAll('.item span');
        if (items.length === 0) return;
        let allText = "";
        items.forEach(item => { allText += item.innerText + "\n"; });
        navigator.clipboard.writeText(allText).then(() => {
            showToast('Semua ' + items.length + ' link tersalin!');
        });
    }

    /* ========== RESET ========== */
    function resetForm() {
        document.getElementById('smartlinkInput').value = '';
        document.getElementById('count').value = '10';

        // Reset LP
        document.getElementById('lpSwitch').checked = false;
        toggleLP();
        document.getElementById('lpCustomInput').value = '';
        document.getElementById('lpCustomBox').style.display = 'none';
        document.querySelectorAll('.lp-item').forEach(item => {
            item.classList.remove('selected');
            item.querySelector('input[type="checkbox"]').checked = false;
        });

        // Reset FB
        document.getElementById('fbSwitch').checked = false;
        toggleFB();
        document.getElementById('fbCustomInput').value = '';
        document.getElementById('fbCustomBox').style.display = 'none';
        selectedFBPrefix = 'https://web.facebook.com/l.php?u=';
        document.querySelectorAll('.fb-item').forEach(item => item.classList.remove('selected'));
        document.querySelector('.fb-item[data-prefix="https://web.facebook.com/l.php?u="]').classList.add('selected');

        // Reset pipeline & output
        document.getElementById('pipelineVisual').classList.remove('show');
        document.getElementById('outputBox').style.display = 'none';
        document.getElementById('outputList').innerHTML = '';
        document.getElementById('outputBadges').innerHTML = '';

        showToast('Form di-reset!');
    }

    /* ========== TOAST ========== */
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.className = 'show';
        setTimeout(function() { toast.className = toast.className.replace('show', ''); }, 3000);
    }

    window.addEventListener('DOMContentLoaded', initTheme);
</script>

</body>
</html>
