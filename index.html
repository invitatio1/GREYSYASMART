<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --text-main: #1a202c;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --input-border: #e2e8f0;
            --input-focus-ring: rgba(102, 126, 234, 0.1);
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --switch-bg-off: #cbd5e0;
            --switch-bg-on: #48bb78;
            --btn-reset-bg: #cbd5e0;
            --btn-reset-text: #4a5568;
            --btn-reset-hover: #a0aec0;
            --fb-selected-bg: #e7f3ff;
            --fb-selected-border: #1877f2;
            --fb-blue: #1877f2;
            --fb-blue-bg: #e8f0fe;
            --fb-blue-border: #a8c7fa;
            --caption-selected-bg: #fff5f5;
            --caption-selected-border: #f56565;
            --shadow-card: 0 10px 25px rgba(0,0,0,0.05);
            --shadow-input: 0 0 0 3px var(--input-focus-ring);
            --group-header-bg: #f7fafc;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e0;
            --text-muted: #64748b;
            --border: #334155;
            --input-bg: #0f172a;
            --input-border: #334155;
            --input-focus-ring: rgba(102, 126, 234, 0.2);
            --switch-bg-off: #475569;
            --btn-reset-bg: #334155;
            --btn-reset-text: #94a3b8;
            --btn-reset-hover: #475569;
            --shadow-card: 0 10px 25px rgba(0,0,0,0.4);
            --fb-selected-bg: rgba(24, 119, 242, 0.12);
            --fb-selected-border: #4d9aff;
            --fb-blue: #4d9aff;
            --fb-blue-bg: rgba(24, 119, 242, 0.1);
            --fb-blue-border: rgba(77, 154, 255, 0.3);
            --caption-selected-bg: rgba(245, 101, 101, 0.1);
            --caption-selected-border: #fc8181;
            --group-header-bg: rgba(247, 250, 252, 0.05);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; 
            background: var(--bg-body); 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            min-height: 100vh;
            transition: background 0.3s ease;
        } 
        
        .card { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: var(--shadow-card); 
            width: 100%; 
            max-width: 640px; 
            transition: background 0.3s ease, box-shadow 0.3s ease;
        } 
        
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h2 { 
            margin: 0;
            color: var(--text-main); 
            font-weight: 800; 
            font-size: 1.75rem;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .theme-toggle-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .theme-toggle-btn:hover {
            background: var(--input-bg);
            color: var(--text-main);
        }
        .theme-toggle-btn svg { width: 20px; height: 20px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-secondary); font-size: 14px; }
        
        input[type="text"], input[type="number"], textarea { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid var(--input-border); 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: var(--input-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
        } 
        textarea {
            resize: vertical;
            min-height: 110px;
            line-height: 1.7;
        }
        input:focus, textarea:focus { 
            border-color: var(--accent-primary); 
            outline: none; 
            box-shadow: var(--shadow-input);
        }

        .input-hint {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
        }
        .input-hint-text {
            font-size: 11px;
            color: var(--text-muted);
        }
        .smartlink-counter {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-primary);
            background: var(--input-focus-ring);
            padding: 2px 10px;
            border-radius: 20px;
            transition: all 0.2s;
        }
        .smartlink-counter.has-links {
            color: var(--switch-bg-on);
            background: rgba(72, 187, 120, 0.1);
        }

        /* Layout Side-by-Side Container */
        .side-by-side-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .side-by-side-wrapper { grid-template-columns: 1fr; }
        }

        .panel-section {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
        }

        .panel-control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 4px 10px;
            background: var(--input-bg);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .panel-status-text {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.3s;
        }
        .panel-status-dot.on { background: var(--switch-bg-on); }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--switch-bg-off);
            transition: .4s;
            border-radius: 16px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--switch-bg-on); }
        input:checked + .slider:before { transform: translateX(16px); }

        .panel-container-disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* Caption Styles */
        .caption-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 5px;
            margin-bottom: 5px;
        }
        .caption-item {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .caption-item:hover { border-color: var(--text-muted); }
        .caption-item.selected {
            border-color: var(--caption-selected-border);
            background-color: var(--caption-selected-bg);
        }
        .caption-text {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
            flex-grow: 1;
        }
        .caption-checkbox {
            width: 14px; height: 14px;
            accent-color: var(--caption-selected-border);
            cursor: pointer;
            flex-shrink: 0;
        }
        .caption-custom-input {
            display: none; 
            margin-top: 5px;
            padding: 5px;
            background: var(--caption-selected-bg);
            border: 1px solid var(--caption-selected-border);
            border-radius: 6px;
        }

        /* FB Styles */
        .fb-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            margin-bottom: 5px;
        }
        .fb-item {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 35px;
        }
        .fb-item:hover { border-color: var(--text-muted); }
        .fb-item.selected {
            border-color: var(--fb-selected-border);
            background-color: var(--fb-selected-bg);
        }
        .fb-prefix-text {
            font-family: 'Courier New', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.2;
            word-break: break-all;
            transition: color 0.2s;
        }
        .fb-item.selected .fb-prefix-text { color: var(--fb-blue); }
        .fb-custom-input {
            display: none; 
            margin-top: 5px;
            padding: 5px;
            background: var(--fb-blue-bg);
            border: 1px solid var(--fb-blue-border);
            border-radius: 6px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        button { 
            padding: 14px; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
        } 
        button:active { transform: scale(0.98); }

        .btn-generate {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }
        .btn-generate:hover { opacity: 0.9; }

        .btn-reset {
            background: var(--btn-reset-bg);
            color: var(--btn-reset-text);
        }
        .btn-reset:hover { background: var(--btn-reset-hover); }

        /* --- OUTPUT --- */
        .output-box { 
            margin-top: 30px; 
            border-top: 2px dashed var(--border); 
            padding-top: 20px; 
            display: none; 
            animation: slideIn 0.3s ease;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .output-title { font-weight: bold; color: var(--text-main); font-size: 14px; }

        .btn-copy-all {
            background: var(--switch-bg-on);
            color: white;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(72, 187, 120, 0.3);
        }
        .btn-copy-all:hover { background: #38a169; }

        #outputTextarea {
            width: 100%;
            height: 250px;
            padding: 10px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text-main);
            font-family: 'Courier New', monospace;
            font-size: 11px; /* Font size kecil sesuai request */
            line-height: 1.4;
            resize: vertical;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            position: fixed;
            z-index: 100;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #toast.show { opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-row">
        <h2>⚡multi link</h2>
        <button class="theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" title="Ganti Tema">
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display: none;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>
    </div>

    <div class="form-group">
        <label>Smartlink Asli</label>
        <textarea id="smartlinkInput" placeholder="https://smartlink1.com/?ref=user&#10;https://smartlink2.com/?ref=user" oninput="updateSmartlinkCounter()"></textarea>
        <div class="input-hint">
            <span class="input-hint-text">Satu smartlink per baris</span>
            <span class="smartlink-counter" id="smartlinkCounter">0 link</span>
        </div>
    </div>

    <!-- Side-by-Side Wrapper -->
    <div class="side-by-side-wrapper">
        
        <!-- Caption Panel -->
        <div class="form-group" style="margin-bottom: 0;">
            <div class="panel-section">
                <div class="panel-control-header">
                    <div class="panel-status-text">
                        <span class="panel-status-dot" id="captionDot"></span>
                        <span id="captionStatusText">Off</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="captionSwitch" onchange="toggleCaption()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="captionContainer" class="panel-container-disabled">
                    <div class="caption-grid">
                        <div class="caption-item selected" onclick="toggleCaptionSelection(this)">
                            <span class="caption-text">👙💋 𝘚𝘰𝘭𝘰 𝘢𝘥𝘶𝘭𝘵𝘰𝘴 ❤️ 🇺🇸 𝘗𝘰𝘳 𝘧𝘢𝘷𝘰𝘳 𝘷𝘦𝘢 𝘢𝘲𝘶í 👙📲👇</span>
                            <input type="checkbox" class="caption-checkbox" checked>
                        </div>
                    </div>
                    <div class="caption-custom-input" id="captionCustomBox">
                        <label style="font-size:10px; margin-bottom:3px; color:var(--text-muted);">Custom Text:</label>
                        <textarea id="captionCustomInput" style="padding:5px; border:1px solid var(--border); font-size:11px; min-height:80px;" placeholder="Baris teks 1&#10;Baris teks 2&#10;Baris teks 3"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- FB Cloaking Panel -->
        <div class="form-group" style="margin-bottom: 0;">
            <div class="panel-section">
                <div class="panel-control-header">
                    <div class="panel-status-text">
                        <span class="panel-status-dot" id="fbDot"></span>
                        <span id="fbStatusText">Off</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="fbSwitch" onchange="toggleFB()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="fbContainer" class="panel-container-disabled">
                    <div class="fb-grid">
                        <div class="fb-item selected" onclick="selectFB(this)" data-prefix="https://web.facebook.com/l.php?u=">
                            <span class="fb-prefix-text">web.facebook.com</span>
                        </div>
                        <div class="fb-item" onclick="selectFB(this)" data-prefix="https://l.facebook.com/l.php?u=">
                            <span class="fb-prefix-text">l.facebook.com</span>
                        </div>
                        <div class="fb-item" onclick="selectFB(this)" data-prefix="https://m.facebook.com/l.php?u=">
                            <span class="fb-prefix-text">m.facebook.com</span>
                        </div>
                        <div class="fb-item" onclick="selectFB(this)" data-prefix="custom">
                            <span class="fb-prefix-text">Custom...</span>
                        </div>
                    </div>
                    <div class="fb-custom-input" id="fbCustomBox">
                        <label style="font-size:10px; margin-bottom:3px; color:var(--text-muted);">Custom Prefix:</label>
                        <input type="text" id="fbCustomInput" placeholder="https://..." style="padding:5px; border:1px solid var(--border); font-size:11px; background:var(--input-bg); color:var(--text-main);">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="form-group">
        <label>Jumlah Link Total</label>
        <input type="number" id="count" value="10" min="1">
    </div>

    <div class="btn-group">
        <button class="btn-generate" onclick="generate()">🚀 Generate Link</button>
        <button class="btn-reset" onclick="resetForm()">🔄 Reset</button>
    </div>

    <div id="outputBox" class="output-box">
        <div class="output-header">
            <span class="output-title">Hasil Generate</span>
            <button class="btn-copy-all" onclick="copyAll()">📋 Salin Semua</button>
        </div>
        <textarea id="outputTextarea" readonly></textarea>
    </div>
</div>

<div id="toast">Berhasil disalin!</div>

<script>
    let selectedFBPrefix = 'https://web.facebook.com/l.php?u=';

    /* ========== THEME ========== */
    function initTheme() {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(saved === 'dark' || (!saved && prefersDark) ? 'dark' : 'light');
    }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(next);
        localStorage.setItem('theme', next);
    }
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('iconSun').style.display = theme === 'dark' ? 'none' : 'block';
        document.getElementById('iconMoon').style.display = theme === 'dark' ? 'block' : 'none';
    }

    /* ========== SMARTLINK ========== */
    function updateSmartlinkCounter() {
        const links = parseSmartlinks();
        const counter = document.getElementById('smartlinkCounter');
        counter.textContent = links.length + ' link';
        counter.classList.toggle('has-links', links.length > 0);
    }

    function parseSmartlinks() {
        const raw = document.getElementById('smartlinkInput').value.trim();
        if (!raw) return [];
        return raw.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    }

    /* ========== DISTRIBUSI ========== */
    function getDistribution(total, numSL) {
        const dist = new Array(numSL).fill(0);
        let remaining = total;
        for (let i = 0; i < numSL && remaining > 0; i++) {
            const give = Math.ceil(remaining / (numSL - i));
            dist[i] = give;
            remaining -= give;
        }
        return dist;
    }

    /* ========== CAPTION ========== */
    function toggleCaption() {
        const isOn = document.getElementById('captionSwitch').checked;
        document.getElementById('captionContainer').classList.toggle('panel-container-disabled', !isOn);
        document.getElementById('captionStatusText').innerText = isOn ? "On" : "Off";
        document.getElementById('captionStatusText').style.color = isOn ? "#f56565" : "#718096";
        document.getElementById('captionDot').classList.toggle('on', isOn);
    }

    function toggleCaptionSelection(el) {
        if (!document.getElementById('captionSwitch').checked) return;
        el.classList.toggle('selected');
        const cb = el.querySelector('input[type="checkbox"]');
        cb.checked = !cb.checked;
        const customBox = document.getElementById('captionCustomBox');
        if (el.textContent.includes("Custom") && cb.checked) {
            customBox.style.display = 'block';
             document.querySelectorAll('.caption-item').forEach(i => {
                 if(!i.textContent.includes("Custom")) {
                     i.classList.remove('selected');
                     i.querySelector('input').checked = false;
                 }
             });
        } else if (!el.textContent.includes("Custom") && cb.checked) {
            customBox.style.display = 'none';
             document.querySelectorAll('.caption-item').forEach(i => {
                 if(i.textContent.includes("Custom")) {
                     i.classList.remove('selected');
                     i.querySelector('input').checked = false;
                 }
             });
        }
    }

    function getCaptionLines() {
        if (!document.getElementById('captionSwitch').checked) return null;
        const customBox = document.getElementById('captionCustomBox');
        if (customBox.style.display === 'block') {
            const text = document.getElementById('captionCustomInput').value.trim();
            return text ? text.split('\n') : null;
        }
        return [
            "👙💋 𝘚𝘰𝘭𝘰 𝘢𝘥𝘶𝘭𝘵𝘰𝘴 ❤️ 🇺🇸",
            "𝘕𝘰 𝘱𝘶𝘦𝘥𝘰 𝘱𝘶𝘣𝘭𝘪𝘤𝘢𝘳 𝘧𝘰𝘵𝘰𝘴 𝘰 𝘷𝘪𝘥𝘦𝘰𝘴 𝘱𝘢𝘳𝘢 𝘢𝘥𝘶𝘭𝘵𝘰𝘴 𝘦𝘯 𝘍𝘢𝘤𝘦𝘣𝘰𝘰𝘬",
            "𝘗𝘰𝘳 𝘧𝘢𝘷𝘰𝘳 𝘷𝘦𝘢 𝘢𝘲𝘶í 👙📲👇"
        ];
    }

    /* ========== CLOAKING FB ========== */
    function toggleFB() {
        const isOn = document.getElementById('fbSwitch').checked;
        document.getElementById('fbContainer').classList.toggle('panel-container-disabled', !isOn);
        document.getElementById('fbStatusText').innerText = isOn ? "On" : "Off";
        document.getElementById('fbStatusText').style.color = isOn ? "#48bb78" : "#718096";
        document.getElementById('fbDot').classList.toggle('on', isOn);
    }

    function selectFB(el) {
        if (!document.getElementById('fbSwitch').checked) return;
        document.querySelectorAll('.fb-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        const prefix = el.getAttribute('data-prefix');
        const customBox = document.getElementById('fbCustomBox');
        if (prefix === 'custom') {
            selectedFBPrefix = '';
            customBox.style.display = 'block';
            setTimeout(() => document.getElementById('fbCustomInput').focus(), 100);
        } else {
            selectedFBPrefix = prefix;
            customBox.style.display = 'none';
        }
    }

    function getActiveFBPrefix() {
        if (!document.getElementById('fbSwitch').checked) return '';
        const sel = document.querySelector('.fb-item.selected');
        if (!sel) return '';
        if (sel.getAttribute('data-prefix') === 'custom') {
            return document.getElementById('fbCustomInput').value.trim();
        }
        return selectedFBPrefix;
    }

    function applyFB(url) {
        const prefix = getActiveFBPrefix();
        return prefix ? prefix + encodeURIComponent(url) : url;
    }

    /* ========== UTILS ========== */
    function makeId(len) {
        const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let r = '';
        for (let i = 0; i < len; i++) r += c.charAt(Math.floor(Math.random() * c.length));
        return r;
    }

    /* ========== GENERATE ========== */
    function generate() {
        const smartlinks = parseSmartlinks();
        const totalCount = parseInt(document.getElementById('count').value);
        const capOn = document.getElementById('captionSwitch').checked;
        const fbOn = document.getElementById('fbSwitch').checked;
        const fbPrefix = getActiveFBPrefix();
        const captionLines = getCaptionLines();

        const outputBox = document.getElementById('outputBox');
        const textarea = document.getElementById('outputTextarea');

        textarea.value = '';

        if (smartlinks.length === 0) { showToast('Isi minimal satu Smartlink!'); return; }
        if (isNaN(totalCount) || totalCount < 1) { showToast('Jumlah link tidak valid!'); return; }
        if (capOn && !captionLines) { showToast('Pilih atau isi teks caption!'); return; }
        if (fbOn && !fbPrefix) { showToast('Pilih atau isi prefix cloaking!'); return; }

        const distribution = getDistribution(totalCount, smartlinks.length);
        const allLines = [];

        smartlinks.forEach((smartlink, sIdx) => {
            const perSL = distribution[sIdx];
            for (let i = 0; i < perSL; i++) {
                const code = makeId(8);
                const sep = smartlink.includes('?') ? '&' : '?';
                let link = smartlink + sep + code;
                
                if (fbOn && fbPrefix) link = applyFB(link);

                if (capOn && captionLines) {
                    captionLines.forEach(line => {
                        allLines.push(line);
                    });
                }
                
                allLines.push(link);
            }
        });

        textarea.value = allLines.join('\n');
        outputBox.style.display = 'block';
        outputBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ========== COPY ========== */
    function copyAll() {
        const textarea = document.getElementById('outputTextarea');
        if (!textarea.value) return;
        textarea.select();
        navigator.clipboard.writeText(textarea.value).then(() => {
            showToast('Semua tersalin!');
        });
    }

    /* ========== RESET ========== */
    function resetForm() {
        document.getElementById('smartlinkInput').value = '';
        document.getElementById('count').value = '10';
        updateSmartlinkCounter();

        document.getElementById('captionSwitch').checked = false;
        toggleCaption();
        document.getElementById('captionCustomInput').value = '';
        document.getElementById('captionCustomBox').style.display = 'none';
        document.querySelectorAll('.caption-item').forEach(i => {
            i.classList.remove('selected');
            i.querySelector('input').checked = false;
        });
        const defaultCaption = document.querySelector('.caption-item');
        if(defaultCaption) {
            defaultCaption.classList.add('selected');
            defaultCaption.querySelector('input').checked = true;
        }

        document.getElementById('fbSwitch').checked = false;
        toggleFB();
        document.getElementById('fbCustomInput').value = '';
        document.getElementById('fbCustomBox').style.display = 'none';
        selectedFBPrefix = 'https://web.facebook.com/l.php?u=';
        document.querySelectorAll('.fb-item').forEach(i => i.classList.remove('selected'));
        document.querySelector('.fb-item[data-prefix="https://web.facebook.com/l.php?u="]').classList.add('selected');

        document.getElementById('outputBox').style.display = 'none';
        document.getElementById('outputTextarea').value = '';

        showToast('Form di-reset!');
    }

    /* ========== TOAST ========== */
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.className = 'show';
        setTimeout(() => { t.className = t.className.replace('show', ''); }, 3000);
    }

    window.addEventListener('DOMContentLoaded', initTheme);
</script>

</body>
</html>
